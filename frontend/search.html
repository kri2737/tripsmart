<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - TripSmart</title>
</head>

<body>

    <h1>Search</h1>

    <form id="search">
        <input type="text" id="destination" placeholder="destination" required>
        <input type="number" id="days" placeholder="Days" required>
        <input type="number" id="people" placeholder="Number of people" required>
        <input type="number" id="budget" placeholder=" Enter your budget" required>
        <button type="submit">Search</button>
    </form>
    <div id="result"></div>
    <button id="saveButton" style="display:none;">Save This Trip</button>
    <p id="message"></p>

    <script src="js/search.js"></script>
</body>
</html>
